spring.application.name=demo

# REMOVE OR COMMENT OUT THIS EXCLUDE LINE:
# spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# Use in-memory H2 by default for easier local testing. To use MySQL,
# override these properties in environment-specific configuration.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate / JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Uncomment and set the following to use MySQL instead of H2:
# spring.datasource.url=jdbc:mysql://localhost:3306/dbberou
# spring.datasource.username=root
# spring.datasource.password=root
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Error handling settings
server.error.whitelabel.enabled=false
server.error.path=/app-error
server.error.include-stacktrace=never 

server.port=8080 
security.basic.enabled=false